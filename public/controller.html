<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Wizard Arena — Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #fff;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }

    #info {
      text-align: center;
    }

    #label {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #hp-track {
      width: 180px;
      height: 10px;
      background: #333;
      border-radius: 5px;
      margin: 0 auto;
    }

    #hp-fill {
      height: 100%;
      width: 100%;
      background: #2ecc40;
      border-radius: 5px;
      transition: width 0.1s, background 0.3s;
    }

    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
    }

    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 6px;
    }

    .btn {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 14px;
      color: #ddd;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.05s, border-color 0.05s;
    }

    .btn.active {
      background: #444;
      border-color: #aaa;
      color: #fff;
    }

    .cell-empty { visibility: hidden; }

    #btn-shoot {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #7a1515;
      border: 3px solid #c0392b;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #ffcccc;
    }

    #btn-shoot.active {
      background: #c0392b;
      border-color: #ff6b6b;
      color: #fff;
    }

    body.dead #controls { opacity: 0.35; pointer-events: none; }

    #dead-msg {
      display: none;
      font-size: 1.2rem;
      color: #888;
      letter-spacing: 0.1em;
    }

    body.dead #dead-msg { display: block; }
    body.dead #hp-fill { background: #555; }

    /* Landscape layout */
    body.landscape {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
    }

    body.landscape #info {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 80px;
    }

    body.landscape #label { font-size: 1.1rem; margin-bottom: 6px; }
    body.landscape #hp-track { width: 70px; }

    body.landscape #controls {
      flex: 1;
      max-width: none;
      justify-content: space-around;
      align-items: center;
    }

    body.landscape #dead-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div id="info">
    <div id="label">Connecting…</div>
    <div id="hp-track"><div id="hp-fill"></div></div>
  </div>

  <div id="controls">
    <div id="dpad">
      <div class="cell-empty"></div>
      <button class="btn" id="btn-up">▲</button>
      <div class="cell-empty"></div>

      <button class="btn" id="btn-left">◄</button>
      <div class="cell-empty"></div>
      <button class="btn" id="btn-right">►</button>

      <div class="cell-empty"></div>
      <button class="btn" id="btn-down">▼</button>
      <div class="cell-empty"></div>
    </div>

    <button class="btn" id="btn-shoot">FIRE</button>
  </div>

  <div id="dead-msg">YOU DIED</div>

  <script src="controller.js"></script>
</body>
</html>
